name: Test Python scripts

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install optional requirements if present
        run: |
          python -m pip install --upgrade pip
          if [ -s requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi

      - name: Run document scanner tests
        run: python test_document_scanner.py

      - name: Run extraction module tests
        run: python test_extraction_modules.py

      - name: Run AI policy researcher tests
        run: python test_ai_policy_researcher.py

      - name: Run AI operator OS tests
        run: python test_ai_operator_os.py
